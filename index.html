    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            /* Efeito de fundo gradiente animado sutil */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Efeito glassmorphism nos links */
        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.01);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .link-card:hover::before {
            transform: translateX(100%);
        }

        .link-card:active {
            transform: scale(0.98);
        }

        /* Animação de entrada dos itens */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-up {
            animation: fadeUp 0.6s ease-out forwards;
            opacity: 0;
        }

        /* Scrollbar estilizada para PC */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>

        function renderizarLinks() {
            const container = document.getElementById('lista-links');
            let delayBase = 0.2; // Atraso inicial da animação
            let htmlCompleto = '';

            meusProdutos.forEach((prod, index) => {
                // Remove hifens longos que possam ter vindo da formatação do texto original
                let tituloLimpo = prod.titulo.split('- ')[0].trim();
                
                // Calcula um delay progressivo para o efeito "cascata" (limita a 1s para não demorar muito)
                let delay = Math.min(delayBase + (index * 0.05), 1.2).toFixed(2);

                htmlCompleto += `
                    <a href="${prod.link}" target="_blank" rel="noopener noreferrer" 
                       class="link-card flex items-center justify-between p-3 w-full cursor-pointer animate-fade-up group no-underline"
                       style="animation-delay: ${delay}s;">
                        
                        <div class="flex-1 pr-3 pl-2">
                            <h2 class="text-sm sm:text-base font-medium text-white leading-tight group-hover:text-blue-300 transition-colors duration-300">
                                ${tituloLimpo}
                            </h2>
                        </div>
                        
                        <div class="flex-shrink-0 w-14 h-14 rounded-xl bg-white/5 flex items-center justify-center overflow-hidden border border-white/10 group-hover:border-blue-400/50 transition-colors duration-300">
                            <img src="${prod.imagem}" alt="Produto" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                    </a>
                `;
            });

            container.innerHTML = htmlCompleto;
        }

        // Executa ao carregar
        renderizarLinks();
    </script>
